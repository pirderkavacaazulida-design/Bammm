<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Access Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }
        .card h3 { margin-bottom: 10px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
            background: white;
            color: #667eea;
            font-weight: 600;
        }
        .btn:hover { opacity: 0.9; }
        .stats { display: flex; justify-content: space-around; margin: 20px 0; }
        .stat { text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 12px; opacity: 0.8; }
        .key { 
            background: rgba(0,0,0,0.2); 
            padding: 10px; 
            border-radius: 8px; 
            word-break: break-all;
            font-family: monospace;
        }
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .nav-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: transparent;
            color: white;
            cursor: pointer;
        }
        .nav-btn.active { background: white; color: #667eea; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <h1>🤖 AI Access Bot</h1>
    <p style="opacity:0.8;margin-bottom:20px;">Личный кабинет</p>
    
    <div class="nav">
        <button class="nav-btn active" onclick="showTab('stats')">📊 Статистика</button>
        <button class="nav-btn" onclick="showTab('keys')">🔑 Ключи</button>
        <button class="nav-btn" onclick="showTab('support')">📞 Поддержка</button>
    </div>
    
    <div id="tab-stats" class="tab-content active">
        <div class="card">
            <h3>Ваш профиль</h3>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="requests">0</div>
                    <div class="stat-label">Запросов</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="level">1</div>
                    <div class="stat-label">Уровень</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="xp">0</div>
                    <div class="stat-label">XP</div>
                </div>
            </div>
            <div style="background:rgba(255,255,255,0.2);border-radius:8px;height:8px;margin-top:10px;">
                <div id="xp-bar" style="background:white;height:100%;border-radius:8px;width:0%;"></div>
            </div>
        </div>
        
        <div class="card">
            <h3>Достижения</h3>
            <div id="achievements">Загрузка...</div>
        </div>
        
        <button class="btn" onclick="sendData('get_key')">🔑 Получить API ключ</button>
        <button class="btn" onclick="sendData('get_profile')">👤 Профиль</button>
    </div>
    
    <div id="tab-keys" class="tab-content">
        <div class="card">
            <h3>Ваши API ключи</h3>
            <div id="keys-list">Загрузка...</div>
        </div>
    </div>
    
    <div id="tab-support" class="tab-content">
        <div class="card">
            <h3>Поддержка</h3>
            <p>Опишите проблему:</p>
            <textarea id="support-text" style="width:100%;height:100px;border-radius:8px;padding:10px;margin:10px 0;border:none;"></textarea>
            <button class="btn" onclick="sendSupport()">Отправить</button>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        function showTab(name) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            event.target.classList.add('active');
        }
        
        function sendData(action) {
            tg.sendData(JSON.stringify({action: action, user_id: tg.initDataUnsafe?.user?.id}));
        }
        
        function sendSupport() {
            const text = document.getElementById('support-text').value;
            tg.sendData(JSON.stringify({action: 'support', text: text}));
        }
        
        // Загрузка данных
        tg.ready();
    </script>
</body>
</html>
